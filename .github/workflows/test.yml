name: Unit tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Give every push its own group so main runs are never queued behind or
  # cancelled by other runs. PR runs share a per-PR group so superseded
  # commits are cancelled.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest tests/ -v --durations=20 --ignore=tests/contrib/kernels/quantized_matmul_test.py --ignore=tests/contrib/kernels/lhs_fused_quantized_matmul_test.py
